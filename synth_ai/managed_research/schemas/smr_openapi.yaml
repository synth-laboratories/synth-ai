  /api/v1/health/db:
    get:
      summary: Health Db
      description: 'Database health check with thresholds and actionable status.


        Returns pool stats, utilization, and a status indicator:

        - "healthy": <70% utilization - all good

        - "degraded": 70-85% utilization - warning, reduce load

        - "critical": >85% utilization - danger, shedding load soon


        Returns 503 if status is critical.'
      operationId: health_db_api_v1_health_db_get
      responses:
        '200':
