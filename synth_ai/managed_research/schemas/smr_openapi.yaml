openapi: 3.1.0
info:
  title: Synth API
  description: Synth backend API
  version: 0.2.0
paths:
  /config/pricing:
    get:
      summary: Get Pricing Config
      description: 'Get current pricing configuration _config.config.


        This endpoint exposes pricing-related configuration that the frontend

        can use to display current gating mode and billing provider status.

        Useful for support teams to verify live configuration.'
      operationId: get_pricing_config_config_pricing_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingConfigResponse'
  /health/live:
    get:
      summary: Liveness
      description: Simple liveness probe that doesn't check database.
      operationId: liveness_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Liveness Health Live Get
  /health:
    get:
      summary: Health
      description: 'Health check endpoint with database connectivity test.


        Returns service status and database connectivity.

        Uses SQLAlchemy for database connectivity.'
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/db:
    get:
      summary: Health Db
      description: DB health snapshot with pool and durable work-lease state.
      operationId: health_db_health_db_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Db Health Db Get
  /health/db/cleanup:
    post:
      summary: Cleanup Idle Connections
      description: 'Kill idle database connections to recover from pool exhaustion.


        This endpoint attempts to kill idle connections using multiple methods:

        1. PostgREST RPC (if function deployed)

        2. Direct database connection

        3. Provider-specific APIs (if available)


        Returns cleanup result including number of connections killed.'
      operationId: cleanup_idle_connections_health_db_cleanup_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Cleanup Idle Connections Health Db Cleanup Post
  /health/db/emergency-reset:
    post:
      summary: Emergency Pool Reset Endpoint
      description: "Emergency reset - kills ALL connections (not just idle).\n\n\u26A0\
        \uFE0F Use this only when pool is completely stuck and normal cleanup fails.\n\
        This will interrupt any in-progress queries!"
      operationId: emergency_pool_reset_endpoint_health_db_emergency_reset_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Emergency Pool Reset Endpoint Health Db Emergency
                  Reset Post
  /unsubscribe:
    get:
      summary: Unsubscribe Get
      operationId: unsubscribe_get_unsubscribe_get
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
    post:
      summary: Unsubscribe Post
      operationId: unsubscribe_post_unsubscribe_post
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
  /api/v1/auth/permissions:
    get:
      tags:
      - auth
      summary: Get Permissions
      description: Get organization permissions using SQLAlchemy.
      operationId: get_permissions_api_v1_auth_permissions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsResponse'
  /api/v1/auth/token:
    post:
      tags:
      - auth
      summary: Issue Access Token
      description: Exchange Synth API key for a short-lived JWT used to call vLLM
        using SQLAlchemy.
      operationId: issue_access_token_api_v1_auth_token_post
      parameters:
      - name: X-API-Key
        in: header
        required: true
        schema:
          type: string
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/key-status:
    get:
      tags:
      - auth
      summary: Check API key status
      description: "Check the status of an API key without using it for authentication.\n\
        \    \n    This endpoint helps diagnose why an API key might be failing:\n\
        \    - Whether the key exists in the database\n    - Whether it's active or\
        \ deactivated\n    - Whether it was replaced by a newer key (regenerated)\n\
        \    - What organization it belongs to\n    \n    Pass your API key in the\
        \ Authorization header (Bearer token) or X-API-Key header."
      operationId: check_key_status_api_v1_auth_key_status_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/billing/entitlements:
    get:
      tags:
      - billing
      summary: Get Billing Entitlements
      operationId: get_billing_entitlements_api_v1_billing_entitlements_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingEntitlementSnapshot'
  /api/v1/balance/current:
    get:
      tags:
      - balance
      summary: Get Current Balance
      description: "Get the current credit balance for the authenticated organization.\n\
        \nThis endpoint allows organizations to check their current credit balance\n\
        without requiring admin privileges.\n\nArgs:\n    api_key: Validated API key\
        \ containing organization information\n\nReturns:\n    BalanceResponse: Current\
        \ balance information\n\nRaises:\n    HTTPException: If balance cannot be\
        \ retrieved"
      operationId: get_current_balance_api_v1_balance_current_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
  /api/v1/balance/usage:
    get:
      tags:
      - balance
      summary: Get Usage Summary
      description: "Get usage summary for the authenticated organization.\n\nThis\
        \ endpoint provides a summary of token and GPU usage for the current month\n\
        and last 30 days.\n\nArgs:\n    api_key: Validated API key containing organization\
        \ information\n\nReturns:\n    BalanceUsageSummaryResponse: Usage summary\
        \ with token and GPU statistics\n\nRaises:\n    HTTPException: If usage data\
        \ cannot be retrieved"
      operationId: get_usage_summary_api_v1_balance_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceUsageSummaryResponse'
  /api/v1/balance/autumn-current:
    get:
      tags:
      - balance
      summary: Get Autumn Current Balance
      description: 'Proxy to Autumn to fetch the authoritative billing state for the
        organization.


        Note: This shape is intentionally flexible (raw passthrough) because Autumn''s

        balance representation may evolve. UI should handle the `raw` payload safely.'
      operationId: get_autumn_current_balance_api_v1_balance_autumn_current_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutumnBalanceProxyResponse'
  /api/v1/credits/balance:
    get:
      tags:
      - credits
      summary: Get Credits Balance
      description: Compute org balance from credits_ledger with optional GPU hours
        remaining.
      operationId: get_credits_balance_api_v1_credits_balance_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditsBalanceResponse'
  /api/v1/credits/transactions:
    get:
      tags:
      - credits
      summary: Get Transactions
      description: Return unified purchase/usage transactions from credits_ledger
        (most recent first).
      operationId: get_transactions_api_v1_credits_transactions_get
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/credits/add:
    post:
      tags:
      - credits
      summary: Webhook Add Credits
      description: 'Add credits triggered by webhook.


        Secured by a shared secret header `x-autumn-webhook-secret` which must match

        the environment variable `AUTUMN_WEBHOOK_SECRET`.'
      operationId: webhook_add_credits_api_v1_credits_add_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAddCreditsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/credits/autumn-webhook:
    post:
      tags:
      - credits
      summary: Autumn Webhook
      description: 'Handle Autumn webhooks with receipt tracking to prevent duplicates.


        Secured by shared secret header `x-autumn-webhook-secret`.

        Returns 409 if webhook already processed, 200 on success.'
      operationId: autumn_webhook_api_v1_credits_autumn_webhook_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/pricing/preflight:
    post:
      tags:
      - pricing
      summary: Preflight Check
      description: "Preflight check for GPU usage costs.\n\nComputes estimated cost\
        \ using GPU pricing config \xD7 seconds \xD7 containers,\nthen calls Autumn\
        \ check with mapped feature and quantity.\nReturns combined result to allow\
        \ frontend to show top-up/checkout CTA on deny."
      operationId: preflight_check_api_v1_pricing_preflight_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreflightRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreflightResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/pricing/gpu/record:
    post:
      tags:
      - pricing
      summary: Record Gpu Usage Route
      description: 'Record GPU wall-clock usage and deduct credits.


        This is designed to be called from Modal containers which cannot import backend
        services reliably.'
      operationId: record_gpu_usage_route_api_v1_pricing_gpu_record_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GPURecordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Record Gpu Usage Route Api V1 Pricing Gpu Record Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/me:
    get:
      tags:
      - me
      summary: Get Me
      operationId: get_me_api_v1_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /api/v1/free-tier/usage:
    get:
      tags:
      - free-tier
      summary: Get Free Tier Usage
      description: 'Get free tier usage and limits for the authenticated organization.


        Returns current usage against daily and monthly limits, plus timestamps

        for when limits reset.'
      operationId: get_free_tier_usage_api_v1_free_tier_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeTierUsageResponse'
  /api/v1/synth/models:
    get:
      tags:
      - synth
      summary: List Synth Models
      operationId: list_synth_models_api_v1_synth_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response List Synth Models Api V1 Synth Models Get
  /api/v1/stack-aux/usage:
    get:
      tags:
      - stack-aux
      summary: Get Stack Aux Usage
      operationId: get_stack_aux_usage_api_v1_stack_aux_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/stack-aux/openai/v1/responses:
    post:
      tags:
      - stack-aux
      summary: Stack Aux Create Response
      operationId: stack_aux_create_response_api_v1_stack_aux_openai_v1_responses_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/stack-inference/usage:
    get:
      tags:
      - stack-inference
      summary: Get Stack Inference Usage
      operationId: get_stack_inference_usage_api_v1_stack_inference_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/stack-inference/openai/v1/responses:
    post:
      tags:
      - stack-inference
      summary: Stack Inference Create Response
      operationId: stack_inference_create_response_api_v1_stack_inference_openai_v1_responses_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/growth/cta-events:
    post:
      tags:
      - growth
      summary: Record Growth Cta Event
      operationId: record_growth_cta_event_api_v1_growth_cta_events_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrowthCtaEventRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthCtaEventResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/growth/funnel-events/ready:
    get:
      tags:
      - growth
      summary: Growth Funnel Events Ready
      operationId: growth_funnel_events_ready_api_v1_growth_funnel_events_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  anyOf:
                  - type: string
                  - type: boolean
                type: object
                title: Response Growth Funnel Events Ready Api V1 Growth Funnel Events
                  Ready Get
  /api/v1/growth/funnel-events:
    post:
      tags:
      - growth
      summary: Record Growth Funnel Event
      operationId: record_growth_funnel_event_api_v1_growth_funnel_events_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrowthFunnelEventRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthFunnelEventResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/growth/funnel/{product}:
    get:
      tags:
      - growth
      summary: Growth Funnel Product Rollup
      operationId: growth_funnel_product_rollup_api_v1_growth_funnel__product__get
      parameters:
      - name: product
        in: path
        required: true
        schema:
          type: string
          title: Product
      - name: window_days
        in: query
        required: false
        schema:
          type: integer
          default: 30
          title: Window Days
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Growth Funnel Product Rollup Api V1 Growth Funnel  Product  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/product/stack-crashes/ready:
    get:
      tags:
      - product
      summary: Stack Crash Reports Ready
      operationId: stack_crash_reports_ready_api_v1_product_stack_crashes_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  anyOf:
                  - type: string
                  - type: boolean
                type: object
                title: Response Stack Crash Reports Ready Api V1 Product Stack Crashes
                  Ready Get
  /api/v1/product/stack-usage-events/ready:
    get:
      tags:
      - product
      summary: Stack Usage Events Ready
      operationId: stack_usage_events_ready_api_v1_product_stack_usage_events_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  anyOf:
                  - type: string
                  - type: boolean
                type: object
                title: Response Stack Usage Events Ready Api V1 Product Stack Usage
                  Events Ready Get
  /api/v1/product/stack-usage-events:
    post:
      tags:
      - product
      summary: Record Stack Usage Events
      operationId: record_stack_usage_events_api_v1_product_stack_usage_events_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StackUsageEventsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackUsageEventsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/product/stack-crashes:
    post:
      tags:
      - product
      summary: Record Stack Client Crash
      operationId: record_stack_client_crash_api_v1_product_stack_crashes_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StackCrashReportRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackCrashReportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - product
      summary: List Stack Crash Reports
      operationId: list_stack_crash_reports_api_v1_product_stack_crashes_get
      parameters:
      - name: crash_class
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 80
          - type: 'null'
          title: Crash Class
      - name: surface
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 80
          - type: 'null'
          title: Surface
      - name: version
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 80
          - type: 'null'
          title: Version
      - name: window_days
        in: query
        required: false
        schema:
          type: integer
          maximum: 365
          minimum: 1
          default: 30
          title: Window Days
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackCrashReportListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/product/stack-crashes/summary:
    get:
      tags:
      - product
      summary: Stack Crash Reports Summary
      operationId: stack_crash_reports_summary_api_v1_product_stack_crashes_summary_get
      parameters:
      - name: window_days
        in: query
        required: false
        schema:
          type: integer
          maximum: 365
          minimum: 1
          default: 7
          title: Window Days
      - name: recent_limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 10
          title: Recent Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackCrashReportSummaryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/usage:
    get:
      tags:
      - usage
      summary: Get Usage
      description: 'Get usage and limits for the authenticated organization.


        Returns current usage against daily and monthly limits for all API surfaces,

        organized by API type (inference, verifiers, rl, sft, research).


        Response includes:

        - org_id: Organization identifier

        - tier: Current tier (free, free_beta, standard, standard_beta, max, max_beta)

        - period: Start dates for daily and monthly periods

        - apis: Usage metrics per API surface

        - totals: Aggregate usage (total spend)'
      operationId: get_usage_api_v1_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'
  /api/v1/usage/user-limits:
    get:
      tags:
      - usage
      summary: Get User Limits
      description: 'Get effective limits for the authenticated user.


        Combines org rate limits (tier/overrides) with access-tier permissions

        (scopes, allowed models, allowed workflows).'
      operationId: get_user_limits_api_v1_usage_user_limits_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLimitsResponse'
  /api/v1/usage/tiers:
    get:
      tags:
      - usage
      summary: Get Tier Limits
      description: 'Get default rate limits for all tiers.


        Returns the default limits for each tier

        (free, free_beta, standard, standard_beta, max, max_beta).

        These are the base limits before any per-org overrides are applied.


        Use this endpoint to display pricing/limits information in your application.'
      operationId: get_tier_limits_api_v1_usage_tiers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TierLimitsResponse'
                type: array
                title: Response Get Tier Limits Api V1 Usage Tiers Get
  /api/v1/usage/tiers/{tier}:
    get:
      tags:
      - usage
      summary: Get Tier Limit
      description: "Get default rate limits for a specific tier.\n\nArgs:\n    tier:\
        \ Tier name (free, free_beta, standard, standard_beta, max, max_beta)\n\n\
        Returns default limits for the specified tier."
      operationId: get_tier_limit_api_v1_usage_tiers__tier__get
      parameters:
      - name: tier
        in: path
        required: true
        schema:
          type: string
          title: Tier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TierLimitsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
