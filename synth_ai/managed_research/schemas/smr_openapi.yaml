    SmrProjectTriggerRequest:
      properties:
        runbook:
          $ref: '#/components/schemas/RunbookKind'
          description: Typed orchestration posture for this run. Runbooks control
            collaboration behavior, not model selection.
          default: lite
        runbook_preset:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Runbook Preset
          description: Backend-owned launch preset id. Public research-preview presets
            are 'lite', 'standard', 'heavy', 'overnight', and 'continuous'.
        runbook_config_id:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Runbook Config Id
          description: Alias for runbook_preset used by SDK/MCP callers that select
            a backend-owned config.
        host_kind:
          anyOf:
          - $ref: '#/components/schemas/SmrHostKind'
          - type: 'null'
          description: Required run-level execution substrate. Supported values are
            docker, daytona.
        worker_pool_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Worker Pool Id
          description: Optional per-run worker dispatch pool override. When omitted,
            the run uses the project's execution pool configuration.
        execution_policy:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Execution Policy
          description: Optional run-scoped execution-policy overlay materialized in
            this run's immutable config snapshot.
        local_execution:
          anyOf:
          - $ref: '#/components/schemas/SmrLocalExecutionRequest'
          - type: 'null'
          description: Explicit local execution handoff from synth-dev. When present
            and requires_hosted_capacity=false, launch preflight uses slot-local capacity
            without hosted Codex pool blockers.
        execution_profile:
          anyOf:
          - $ref: '#/components/schemas/SmrExecutionProfileRequest'
          - type: 'null'
          description: Typed product-owned execution profile for first-party Docker
            and Daytona launches. Backend validates host kind, runtime lane, repo
            binding, and materialized image or snapshot before dispatch.
        effort_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Effort Id
          description: Optional Research Factory Effort id. When present, the run
            is linked to that Effort and the Effort latest-run pointer is updated
            at launch.
        run_kind:
          type: string
          enum:
          - research
          - maintenance
          title: Run Kind
          description: Kind of work performed by a Factory-linked run. Maintenance
            runs start with an orchestrator that decides whether to stop early, act,
            or delegate stewardship work.
          default: research
        intended_horizon_hours:
          anyOf:
          - type: integer
            enum:
            - 1
            - 4
            - 8
            - 24
            - 168
          - type: 'null'
          title: Intended Horizon Hours
          description: Customer-facing intended run horizon. Backend normalizes this
            to timebox_seconds and keeps runbook/profile/provider details internal.
        timebox_seconds:
          anyOf:
          - type: integer
            minimum: 60.0
          - type: 'null'
          title: Timebox Seconds
        agent_profile:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Profile
          description: Override one shared agent profile ID for this run. Engineer-only
            profiles must be selected through actor_model_overrides for worker:engineer.
        agent_model:
          anyOf:
          - $ref: '#/components/schemas/SmrAgentModel'
          - type: 'null'
          description: Override one shared agent model for this run. Shared top-level
            values are 'baseten/zai-org/GLM-5.2', 'deepseek/deepseek-v4-flash', 'deepseek/deepseek-v4-flash-direct',
            'deepseek/deepseek-v4-pro', 'deepseek/deepseek-v4-pro-direct', 'gpt-5.4-mini',
            'gpt-5.5', 'gpt-5.6-luna', 'x-ai/grok-4.3', 'x-ai/grok-build'. Use actor_model_overrides
            for actor-specific model selection.
        agent_harness:
          anyOf:
          - type: string
            enum:
            - codex
            - cursor
            - opencode_sdk
          - type: 'null'
          title: Agent Harness
          description: Override the agent harness for this run. Supported public values
            are 'codex' and 'opencode_sdk'.
        agent_kind:
          anyOf:
          - type: string
            enum:
            - codex
            - cursor
            - opencode_sdk
          - type: 'null'
          title: Agent Kind
          description: Compatibility alias for agent_harness. Supported public values
            are 'codex' and 'opencode_sdk'.
        agent_model_params:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Agent Model Params
          description: 'Override agent model params for this run (for example {''reasoning_effort'':
            ''medium''}).'
        actor_model_overrides:
          anyOf:
          - items:
              $ref: '#/components/schemas/SmrActorModelSelectionRequest'
            type: array
          - additionalProperties: true
            type: object
          title: Actor Model Overrides
          description: Deprecated compatibility input for actor-scoped model overrides
            keyed by actor_type and actor_subtype. Prefer roles for new integrations.
        roles:
          anyOf:
          - $ref: '#/components/schemas/SmrRoleBindingsRequest'
          - type: 'null'
          description: 'Role-based launch policy: explicit orchestrator/reviewer bindings
            plus worker palette and subtype overrides.'
        work_mode:
          anyOf:
          - type: string
            enum:
            - general
            - open_ended_discovery
            - directed_effort
          - type: 'null'
          title: Work Mode
          description: Run work mode override for this run.
        providers:
          items:
            $ref: '#/components/schemas/ResourceProviderBinding'
          type: array
          title: Providers
          description: Run-scoped provider bindings. Supported public providers are
            openrouter, xai, tinker, synth_ai, cursor, deepseek, baseten, and openai_chatgpt.
        provider_policy:
          anyOf:
          - $ref: '#/components/schemas/ResourceProviderPolicy'
          - type: 'null'
          description: Declarative provider routing preferences. Use agent_inference
            for agent actor traffic and experiment_inference for benchmark/eval model
            traffic. Defaults require ZDR and US domicile/region for OpenAI, Baseten,
            Gemini, and Grok-family providers.
        limit:
          anyOf:
          - $ref: '#/components/schemas/UsageLimit'
          - type: 'null'
          description: Optional run-scoped usage limit.
        required_capabilities:
          items:
            $ref: '#/components/schemas/ResourceCapability'
          type: array
          title: Required Capabilities
          description: Internal proof-lane capability requirement. Defaults to inference.
        initial_runtime_messages:
          items:
            $ref: '#/components/schemas/SmrInitialRuntimeMessageRequest'
          type: array
          title: Initial Runtime Messages
          description: Optional kickoff operator messages for this run. Each item
            is enqueued on the durable runtime message queue at launch (same contract
            as POST /smr/runs/{run_id}/runtime/messages). This is the supported way
            to attach opening intent; the legacy `prompt` field is not accepted.
        objective:
          anyOf:
          - type: string
            maxLength: 10000
            minLength: 1
          - type: 'null'
          title: Objective
          description: Public launch shortcut for one queued kickoff objective message.
            Backend normalizes this into initial_runtime_messages before run start.
        sandbox_override:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Sandbox Override
          description: 'Per-run sandbox image/snapshot override for Docker and Daytona
            hosts. Accepts {image: ''...'', snapshot: ''...''} to override the project
            or env default. image takes precedence over snapshot.'
        actor_image_overrides:
          additionalProperties:
            $ref: '#/components/schemas/SmrActorImageBindingRequest'
          type: object
          title: Actor Image Overrides
          description: Optional per-role runtime image release overrides keyed by
            orchestrator, worker, verifier, evaluator, or judge.
        image_override:
          anyOf:
          - $ref: '#/components/schemas/SmrActorImageBindingRequest'
          - type: 'null'
          description: Optional shorthand runtime image release override expanded
            to every otherwise unresolved actor role at run start.
        runtime_requirements:
          items:
            $ref: '#/components/schemas/SmrRuntimeRequirementRequest'
          type: array
          title: Runtime Requirements
          description: Run-scoped runtime requirements. Backend resolves these only
            against screened actor runtime image specs; arbitrary images are rejected.
        run_policy:
          anyOf:
          - $ref: '#/components/schemas/SmrRunPolicySpec'
          - type: 'null'
          description: Optional run-scoped policy overlay controlling funding-source
            semantics, credential/tool/inference allowlists, and a total-cost cap
            for this run.
        ai_cache:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Ai Cache
          description: Optional local-development run-scoped AI cache policy. When
            set, the runtime materializes actor model traffic through the requested
            cache base_url for this run only.
        kickoff_contract:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Kickoff Contract
          description: Optional staged-run kickoff contract. When provided, this becomes
            the authoritative staged contract for the run and is persisted on the
            run row.
        tool_config:
          anyOf:
          - $ref: '#/components/schemas/SmrRunToolConfigRequest'
          - type: 'null'
          description: Optional run-scoped tool configuration. Use this to explicitly
            scope runtime tool access, such as the GitHub repos allowed for this run.
        resource_bindings:
          anyOf:
          - $ref: '#/components/schemas/SmrRunResourceBindingsRequest'
          - type: 'null'
        environment:
          anyOf:
          - $ref: '#/components/schemas/SmrEnvironmentRefRequest'
          - type: 'null'
        dev_environment_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Dev Environment Id
          description: Optional live DevEnvironment binding. When provided, backend
            validates the project-scoped dev environment and stamps launch_mode=dev_slot_execution
            onto the run contract.
        primary_parent_ref:
          anyOf:
          - $ref: '#/components/schemas/SmrPrimaryParentRefRequest'
          - type: 'null'
        primary_parent:
          anyOf:
          - $ref: '#/components/schemas/SmrPrimaryParentInlineCreateRequest'
          - type: 'null'
        idempotency_key_run_create:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Idempotency Key Run Create
        idempotency_key:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Idempotency Key
      type: object
      title: SmrProjectTriggerRequest
