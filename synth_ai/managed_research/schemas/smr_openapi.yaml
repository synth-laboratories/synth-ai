  /api/demo/keys:
    post:
      tags:
      - demo
      summary: Mint Demo Key
      description: "Mint a demo API key.\n\nThis is a public endpoint (no authentication\
        \ required) for obtaining\ntemporary demo API keys. Keys are rate-limited\
        \ per IP address and\nsubject to global daily spend caps.\n\nDemo keys have\
        \ the following restrictions:\n- Maximum spend: $10\n- Allowed models: gpt-4.1-nano,\
        \ gpt-4.1-mini, gpt-4o-mini, gpt-5-nano\n- Maximum concurrent jobs: 1\n\n\
        Returns:\n    MintDemoKeyResponse with the API key (shown only once), expiry,\
        \ and budget.\n\nRaises:\n    429: Rate limit exceeded (per-IP or global)\n\
        \    503: Global demo capacity reached for the day\n    500: Internal error\
        \ creating key"
      operationId: mint_demo_key_api_demo_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MintDemoKeyRequest'
              default:
                ttl_hours: 4
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MintDemoKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/demo/keys/limits:
    get:
      tags:
      - demo
      summary: Get Demo Limits
      description: 'Get current rate limit status for this IP.


        Returns how many demo keys have been minted from this IP today

        and how many remain.'
      operationId: get_demo_limits_api_demo_keys_limits_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Demo Limits Api Demo Keys Limits Get
