  /v1/tunnels/lease:
    post:
      tags:
      - tunnels
      summary: Create Lease
      description: 'Create or attach to a tunnel lease.


        This is the primary entry point for the new lease-based tunnel system.

        It will:

        1. Ensure a managed tunnel exists for (org_id, client_instance_id)

        2. Create a new lease for the specified local target

        3. Return the tunnel token and public URL


        The SDK should:

        1. Start the local gateway on the fixed port (8016)

        2. Configure the gateway route for this lease

        3. Start cloudflared if not already running

        4. Send heartbeats to keep the lease active'
      operationId: create_lease_v1_tunnels_lease_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - tunnels
      summary: List Leases
      description: 'List active leases for the organization.


        Note: This endpoint does NOT return tunnel tokens for security.

        Use POST /lease to get tokens.'
      operationId: list_leases_v1_tunnels_lease_get
      parameters:
      - name: client_instance_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Instance Id
      - name: include_expired
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Expired
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaseResponse'
                title: Response List Leases V1 Tunnels Lease Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tunnels/lease/{lease_id}/heartbeat:
    post:
      tags:
