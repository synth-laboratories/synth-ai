            type: object
            additionalProperties: true
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        detail:
          type: object
          additionalProperties: true
      additionalProperties: true

    OpenAIChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/OpenAIChatMessage'
        temperature:
          type: number
        max_tokens:
          type: integer
        top_p:
          type: number
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        stream:
          type: boolean
        thinking_budget:
          type: integer
      additionalProperties: true

    OpenAIChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
        name:
          type: string
        tool_call_id:
          type: string
      additionalProperties: true

    OpenAIChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            additionalProperties: true
        usage:
          type: object
          additionalProperties: true
      additionalProperties: true

    OptimizationSystemCreateRequest:
      type: object
      required: [name, technique]
      properties:
        id:
          type: string
        name:
          type: string
        technique:
          type: string
          enum: [discrete_optimization, model_optimization]
        reuse:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true

    OptimizationSystem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        technique:
          type: string
      additionalProperties: true

    OfflineJobCreateRequest:
      type: object
      required: [kind, system, config_mode, config]
      properties:
        technique:
          type: string
          enum: [discrete_optimization]
        kind:
          type: string
          enum: [gepa_offline, mipro_offline, eval]
        system:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            reuse:
              type: boolean
          additionalProperties: true
        config_mode:
          type: string
          enum: [DEFAULT, FULL]
        config:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        auto_start:
          type: boolean
        inference_mode:
          $ref: '#/components/schemas/EvalInferenceMode'
      additionalProperties: true

    OfflineJob:
      type: object
      properties:
        job_id:
          type: string
        state:
          type: string
        kind:
          type: string
        system:
          type: object
          additionalProperties: true
      additionalProperties: true

    EvalInferenceMode:
      type: object
      properties:
        mode:
          type: string
          description: Inference resolver mode. Current supported mode is ephemeral_pool.
        pool_id:
          type: string
          description: Existing Rhodes pool identifier resolved into `/v1/pools/{pool_id}` for eval rollouts.
        pool_ttl_seconds:
          type: integer
          format: int64
          minimum: 1
        auto_cleanup:
          type: boolean
        runtime_type:
          type: string
        template_name:
          type: string
        data_source_id:
          type: string
        dockerfile_upload_path:
          type: string
        environment_type:
          type: string
      additionalProperties: true

    OnlineSessionCreateRequest:
      type: object
      required: [kind, system, config_mode, config]
      properties:
        technique:
          type: string
          enum: [discrete_optimization]
        kind:
          type: string
          enum: [gepa_online, mipro_online]
        system:
          type: object
          additionalProperties: true
        config_mode:
          type: string
          enum: [DEFAULT, FULL]
        config:
          type: object
          additionalProperties: true
        long_horizon_mode:
          $ref: '#/components/schemas/LongHorizonModeConfig'
        multi_agent_mode:
          $ref: '#/components/schemas/MultiAgentModeConfig'
        horizon_generalization:
          $ref: '#/components/schemas/HorizonGeneralizationConfig'
        base_case_gating:
          $ref: '#/components/schemas/BaseCaseGatingConfig'
        paired_eval:
          $ref: '#/components/schemas/PairedEvalConfig'
        waypoint_planner:
          $ref: '#/components/schemas/WaypointPlannerConfig'
        counterfactual_credit:
          $ref: '#/components/schemas/CounterfactualCreditConfig'
        metadata:
          type: object
          additionalProperties: true
        auto_start:
          type: boolean
      additionalProperties: true

    OnlineSession:
      type: object
      properties:
        session_id:
          type: string
        state:
          type: string
        kind:
          type: string
        system:
          type: object
          additionalProperties: true
      additionalProperties: true

