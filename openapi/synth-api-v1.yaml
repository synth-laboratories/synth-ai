openapi: 3.1.0
info:
  title: Synth API (Canonical SDK Surface)
  version: 1.0.0
  x-sdk-package-version: 0.9.4
  description: |
    Canonical HTTP contract for synth-ai SDK namespaces, including OpenAI-compatible
    chat completions for inference.
servers:
  - url: https://api.usesynth.ai
    description: Synth production
security:
  - bearerAuth: []
paths:
  /api/inference/v1/chat/completions:
    post:
      tags: [Inference]
      summary: OpenAI-compatible chat completions via Synth routing
      x-research-track: research/feb28_2026
      x-surface-note: "Ownership moved to research track (2026-02-28). Route remains live for compatibility."
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAIChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIChatCompletionResponse'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /api/inference/jobs:
    post:
      tags: [Inference Jobs]
      summary: Create inference job
      x-research-track: research/feb28_2026
      x-surface-note: "Ownership moved to research track (2026-02-28). Route remains live for compatibility."
      operationId: createInferenceJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceJobCreateRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceJob'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /api/inference/jobs/{job_id}:
    get:
      tags: [Inference Jobs]
      summary: Get inference job (optionally artifact-filtered)
      x-research-track: research/feb28_2026
      x-surface-note: "Ownership moved to research track (2026-02-28). Route remains live for compatibility."
      operationId: getInferenceJob
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: artifact_type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Inference job payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceJob'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /inference/jobs/{job_id}/artifacts/{artifact_id}:
    get:
      tags: [Inference Jobs]
      summary: Download inference artifact bytes
      x-research-track: research/feb28_2026
      x-surface-note: "Ownership moved to research track (2026-02-28). Route remains live for compatibility."
      operationId: downloadInferenceArtifact
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /v1/systems:
    get:
      tags: [Optimization]
      summary: List optimization systems
      operationId: listOptimizationSystems
      parameters:
        - name: technique
          in: query
