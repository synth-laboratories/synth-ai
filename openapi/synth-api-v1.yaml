      type: object
      properties:
        enabled:
          type: boolean
        window_steps:
          type: integer
          minimum: 1
        planner_required:
          type: boolean
      additionalProperties: true

    MultiAgentModeConfig:
      type: object
      properties:
        enabled:
          type: boolean
        method:
          type: string
