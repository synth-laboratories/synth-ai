          type: object
          properties:
            outcome_reward:
              type: number
          additionalProperties: true
        trace_correlation_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        long_horizon:
          $ref: '#/components/schemas/LongHorizonTelemetry'
        multi_agent:
          $ref: '#/components/schemas/MultiAgentTelemetry'
      additionalProperties: true

