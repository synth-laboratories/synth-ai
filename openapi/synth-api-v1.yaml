      summary: Update optimization system
      operationId: updateOptimizationSystem
      parameters:
        - $ref: '#/components/parameters/SystemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/ObjectResponse'
    delete:
      tags: [Optimization]
      summary: Delete/archive optimization system
      operationId: deleteOptimizationSystem
