# Canonical launch-era authoring template for managed-research-facing verifier configs.
# This is an authoring surface, not a runtime-enforced schema.

verifier_id: example_verifier
title: Example Verifier
version: v1alpha1

positioning:
  product_surface: managed_research
  managed_agents_role: >
    Managed Agents is beta infrastructure and verifier/backend machinery for this
    verifier. It is not the main public product headline.
  public_story: >
    Use this template when Managed Research needs a clear verifier definition that
    can be reviewed, copied, and specialized for a concrete task.

task:
  objective: >
    State the judgment task in one sentence.
  judge_mode: structured_assessment
  success_definition: >
    Describe what a correct verifier output should accomplish.

managed_agent_backend:
  runtime_family: horizons_private
  session_surface: anthropic_compatible_managed_agents
  environment_ref: example_environment
  context_policy: summary_plus_request
  main_agent_impl: codex
  subagent_impl: openenv_react
  max_turns: 12

environment_actions:
  allowlist:
    - write_prediction
    - submit
  constraints:
    - Use only the listed environment actions.
    - Return a structured assessment before submit.

evidence:
  visible_inputs:
    - name: primary_context
      source: row.context
      kind: text
      required: true
      notes: >
        Main verifier-visible evidence. This can come from a trace prefix,
        summary, paper excerpt, transcript slice, or similar task-owned input.
    - name: task_metadata
      source: row.meta
      kind: json
      required: false
      notes: >
        Optional structured metadata that helps the verifier interpret the task.
  hidden_eval_only:
    - name: hidden_label
      source: row.label
      kind: scalar
      notes: >
        Hidden ground-truth value used only for evaluation or comparison after
        the managed-agent run completes.

instructions:
  system: |
    You are a verifier. Read the visible evidence, produce a structured
    judgment, and keep the reasoning concise and inspectable.
  task: |
    Describe the specific judgment task here.
  output_guidance:
    - Follow the requested result schema exactly.
    - Use only visible evidence plus the allowed environment actions.
    - Do not reference hidden eval-only fields.

result:
  output_path: prediction
  schema:
    type: object
    properties:
      verdict:
        type: string
      rationale:
        type: string
    required:
      - verdict
      - rationale
    additionalProperties: false

managed_research_consumption:
  intended_use:
    - Managed Research loads or copies this config as the task-owned verifier brief.
    - Task-specific examples should override fields rather than redefine the whole shape.
    - This template should stay small enough for operators to understand in one pass.
