track: prompt_opt_1usd_gpt54_family
task: craftax
base_model: Qwen/Qwen3.5-4B
optimizer_budget_usd: 1.0
optimizer_models:
  - gpt-5.4
  - gpt-5.4-mini
  - gpt-5.4-nano
rollout:
  max_steps: 10
  max_concurrent_rollouts: 4
  rollout_concurrency: 4
  rollout_semaphore_limit: 2
  request_timeout_seconds: 900
  target_action_batch_size: 4
  min_action_batch_size: 3
  temperature: 0.0
  max_tokens: 3072
  enable_thinking: true
  thinking_budget_tokens: 2000
train_seeds:
  - 10007
  - 10008
  - 10011
  - 10014
eval_seeds:
  - 10001
  - 10010
  - 10017
  - 10019
prompt:
  component_name: system_prompt
  seed_prompt: |
    You are a Craftax policy agent. Before acting, keep a compact private todo list with exactly three items: (1) the most urgent danger/blocker, (2) the next tile, object, or resource to target, (3) one fallback action to break loops when
    progress stalls. Refresh completed todo items every turn, and replace stale
    target items if movement repeats without new information. Do not reveal the todo list in the final response.
