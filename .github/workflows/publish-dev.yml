name: Auto-publish to PyPI

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

# Publishes must never race: a second push while one publish is in flight
# waits instead of double-uploading.
concurrency:
  group: publish-pypi-synth-ai
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      needs_publish: ${{ steps.check.outputs.needs_publish }}
      version: ${{ steps.local.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ensure jq (PyPI JSON)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y jq
          fi

      - name: Get local version
        id: local
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed -E 's/^version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Local version: $VERSION"

      - name: Check if publish needed
        id: check
        run: |
          LOCAL="${{ steps.local.outputs.version }}"
          # Fail closed: a metadata lookup failure must fail this job, never
          # be read as "version absent" (which would publish on a PyPI blip).
          # Bounded retry distinguishes a transient outage from real absence.
          META=""
          for attempt in 1 2 3; do
            if META=$(curl -fsSL --max-time 30 https://pypi.org/pypi/synth-ai/json); then
              break
            fi
            META=""
            echo "PyPI metadata fetch failed (attempt $attempt/3); retrying in 10s"
            sleep 10
          done
          if [ -z "$META" ]; then
            echo "::error::PyPI metadata unavailable after 3 attempts; refusing to decide publish"
            exit 1
          fi
          # Check the EXACT release, not .info.version (latest stable): exact
          # lookup is correct for both stable and .dev versions.
          if printf '%s' "$META" | jq -e --arg v "$LOCAL" '.releases | has($v)' >/dev/null; then
            echo "needs_publish=false" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already on PyPI - skipping publish"
          else
            echo "needs_publish=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL not on PyPI - will publish"
          fi

  build-distributions:
    needs: check-version
    if: needs.check-version.outputs.needs_publish == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v4
      - name: Build wheel and sdist
        run: |
          uv sync --group dev
          uv run python -m build
      - name: Verify distributions
        run: |
          ls -1 dist
          ls dist/*.whl
          ls dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  publish:
    needs: [check-version, build-distributions]
    if: needs.check-version.outputs.needs_publish == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment:
      name: pypi
      url: https://pypi.org/project/synth-ai/
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PyPI uploads are immutable; if a rerun races an earlier success,
          # skip the already-uploaded files instead of failing the release.
          skip-existing: true

  create-release:
    needs: [check-version, publish]
    if: needs.check-version.outputs.needs_publish == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release (for dev versions)
        if: contains(needs.check-version.outputs.version, '.dev')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: synth-ai ${{ needs.check-version.outputs.version }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub release (for stable versions)
        if: ${{ !contains(needs.check-version.outputs.version, '.dev') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: synth-ai ${{ needs.check-version.outputs.version }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
