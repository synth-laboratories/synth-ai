name: Auto-publish to PyPI

on:
  push:
    # main publishes stable versions; dev publishes .dev prereleases so the
    # latest fixes are installable (with --pre / an exact pin) before promotion.
    branches: [main, dev]

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      needs_publish: ${{ steps.check.outputs.needs_publish }}
      version: ${{ steps.local.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ensure jq (PyPI JSON)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y jq
          fi

      - name: Get local version
        id: local
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed -E 's/^version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Local version: $VERSION"

      - name: Check if publish needed
        id: check
        run: |
          LOCAL="${{ steps.local.outputs.version }}"
          # Publish when the EXACT local version is not yet on PyPI. Comparing
          # against .info.version (the latest STABLE) would re-fire on every dev
          # push because a .dev prerelease never becomes .info.version, so the
          # same prerelease would be rebuilt/republished repeatedly. Checking
          # .releases[$LOCAL] is correct for both stable and .dev versions.
          if curl -fsSL https://pypi.org/pypi/synth-ai/json \
               | jq -e --arg v "$LOCAL" '.releases | has($v)' >/dev/null 2>&1; then
            echo "needs_publish=false" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already on PyPI - skipping publish"
          else
            echo "needs_publish=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL not on PyPI - will publish"
          fi

  build-distributions:
    needs: check-version
    if: needs.check-version.outputs.needs_publish == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v4
      - name: Build wheel and sdist
        run: |
          uv sync --group dev
          uv run python -m build
      - name: Verify distributions
        run: |
          ls -1 dist
          ls dist/*.whl
          ls dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  publish:
    needs: [check-version, build-distributions]
    if: needs.check-version.outputs.needs_publish == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment:
      name: pypi
      url: https://pypi.org/project/synth-ai/
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  create-release:
    needs: [check-version, publish]
    if: needs.check-version.outputs.needs_publish == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release (for dev versions)
        if: contains(needs.check-version.outputs.version, '.dev')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: synth-ai ${{ needs.check-version.outputs.version }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub release (for stable versions)
        if: ${{ !contains(needs.check-version.outputs.version, '.dev') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: synth-ai ${{ needs.check-version.outputs.version }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
