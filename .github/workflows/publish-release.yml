name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+\.[0-9]+'

permissions:
  contents: write
  id-token: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: wheels-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact_name: wheels-linux-aarch64
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          command: build
          args: --release -i python3.11 -o dist --compatibility manylinux2014
      - name: Verify Linux abi3 wheel
        run: |
          ls -1 dist
          ls dist/*.whl | grep -E 'abi3.*manylinux|manylinux.*abi3'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -o dist
      - name: Verify macOS abi3 wheel
        run: |
          ls -1 dist
          ls dist/*.whl | grep -E 'abi3.*macosx|macosx.*abi3'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist/*.whl

  build-sdist:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-linux, build-macos, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/synth-ai/
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (trusted)
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [publish]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: synth-ai ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            pip install synth-ai
            ```
          files: |
            dist/*.whl
            dist/*.tar.gz
