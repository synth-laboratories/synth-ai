# PyPI publishing happens via publish-dev.yml on push to main (version bump in
# pyproject.toml → merge to main → trusted-publisher publish). That is the only
# workflow registered as a PyPI trusted publisher for this project. This Release
# workflow now only cuts a GitHub Release with the built artifacts on tag push;
# it does NOT attempt a (previously always-failing, unregistered) trusted publish.
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+\.[0-9]+'

permissions:
  contents: write

jobs:
  build-distributions:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v4
      - name: Build wheel and sdist
        run: |
          uv sync --group dev
          uv run python -m build
      - name: Verify distributions
        run: |
          ls -1 dist
          ls dist/*.whl
          ls dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-distributions]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: synth-ai ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            pip install synth-ai
            ```
          files: |
            dist/*.whl
            dist/*.tar.gz
