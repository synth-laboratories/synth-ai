# CI workflow for pull requests and pushes to main branches.
# Runs lint, type check, tests, and validation checks in parallel.
# Keep jobs in alphabetical order.

name: CI

on:
  push:
    branches: [main, nightly]
  pull_request:

# Cancel in-progress runs on same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Check README Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"
          # Check if this is a dev version
          if [[ "$VERSION" == *".dev"* ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
          fi
      - name: Check README version matches
        if: steps.get_version.outputs.is_dev == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          README_BADGE=$(grep -o 'PyPI-.*-orange' README.md | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' || echo "")
          README_INSTALL=$(grep -o 'synth-ai==[0-9]\+\.[0-9]\+\.[0-9]\+' README.md | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1 || echo "")

          echo "pyproject.toml version: $VERSION"
          echo "README badge version: $README_BADGE"
          echo "README install version: $README_INSTALL"

          if [ "$README_BADGE" != "$VERSION" ]; then
            echo "❌ README badge version ($README_BADGE) does not match pyproject.toml ($VERSION)"
            exit 1
          fi

          if [ "$README_INSTALL" != "$VERSION" ]; then
            echo "❌ README install version ($README_INSTALL) does not match pyproject.toml ($VERSION)"
            exit 1
          fi

          echo "✅ README version matches pyproject.toml ($VERSION)"
      - name: Skip README check for dev versions
        if: steps.get_version.outputs.is_dev == 'true'
        run: |
          echo "⏭️ Skipping README version check for dev version: ${{ steps.get_version.outputs.version }}"

  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v4
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Check Python-only SDK guard
        run: python scripts/check_no_rust_sdk.py
      - name: Run ruff format check
        run: uv run ruff format --check
      - name: Run ruff check
        run: uv run ruff check

  tests:
    name: Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private SDK pytest suite
        id: checkout_sdk_tests
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: synth-laboratories/testing
          path: testing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v4
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Detect private SDK pytest suite
        id: sdk_tests
        run: |
          if [ -d testing/synth_ai_sdk/sdk ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run SDK pytest suite
        if: steps.sdk_tests.outputs.available == 'true'
        run: uv run --group dev pytest testing/synth_ai_sdk/sdk -v --maxfail=1
      - name: Skip unavailable private SDK pytest suite
        if: steps.sdk_tests.outputs.available != 'true'
        run: |
          echo "Private SDK pytest suite is unavailable in this GitHub Actions context."
      - name: Run Managed Research contract suite
        run: |
          uv run --group dev pytest tests/managed_research/ -q --timeout=300
          uv run --group dev python scripts/validate_contract.py

  type-check:
    name: Type Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v4
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Run ty check
        run: uv run ty check --respect-ignore-files --ignore invalid-return-type --ignore unresolved-attribute --ignore unresolved-import --ignore deprecated --ignore invalid-argument-type --ignore not-iterable --ignore unused-ignore-comment --ignore unknown-argument --ignore possibly-missing-attribute --ignore invalid-assignment
