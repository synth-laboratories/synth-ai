[task]
id = "nanohorizon_craftax_hello_world"
title = "NanoHorizon Craftax Hello World ReportBench"
kind = "smr_reportbench"
version = "0.1"
runner = "workspace/run_nanohorizon_craftax_hello_world_task.py"
default_command = "python3 workspace/run_nanohorizon_craftax_hello_world_task.py run --output-root {output_root}"
score_command = "python3 workspace/run_nanohorizon_craftax_hello_world_task.py score --output-root {output_root} --verifier-mode precheck"
report_path = "reports/reproduction.md"
contract_path = "task_contract.json"

[smr]
execution_mode = "host_local_runner"
pool_strategy = "local_workspace_only"
work_mode = "directed_effort"

[smr.runtime]
runtime_kind = "sandbox_agent"
environment_kind = "harbor"

[smr.project]
name = "ReportBench NanoHorizon Craftax Hello World {nick}-{timestamp}"
timezone = "UTC"
notes = """
REPORT BENCH - staged task mode.

Read the starting-data README, task contract, task.toml, verifier rubric, and
workspace runner before starting.

This task runs a minimal NanoHorizon Craftax baseline with OpenRouter model
`x-ai/grok-4.3` by default. Launch smokes request 100 trajectories, a
500-step cap, and rollout concurrency of 10 so the worker uses the existing
fast NanoHorizon rollout path. The runner writes the concrete rollout evidence,
mean reward summary, scorecard, bounded real gameplay media, result manifest,
and canonical reportbench output bundle.

The task uses the local `nanohorizon` checkout via `uv run --directory ...`.
If needed, set `NANOHORIZON_REPO_ROOT`.
"""

[smr.research]
scenario = "reportbench-nanohorizon_craftax_hello_world"
repo_url = ""

[[smr.research.tasks]]
task_key = "run_nanohorizon_craftax_hello_world"
kind = "repo_task"
worker_pool = "{worker_pool_id}"
instructions = """
Read `{dataset_ref}/README.md`, `{dataset_ref}/task.toml`,
`{dataset_ref}/task_contract.json`, `{dataset_ref}/VERIFIER_RUBRIC.md`,
`{dataset_ref}/workspace/run_nanohorizon_craftax_hello_world_task.py`, and
`{dataset_ref}/workspace/nanohorizon_craftax_hello_world_worker.py`
before you start.

From the current workspace root, run the materialized staged runner and keep
all outputs inside the active workspace:

`NANOHORIZON_ROLLOUTS=100 NANOHORIZON_MAX_STEPS=500 NANOHORIZON_ROLLOUT_CONCURRENCY=10 python3 {dataset_ref}/workspace/run_nanohorizon_craftax_hello_world_task.py run --output-root .`

Then score the produced bundle in place:

`python3 {dataset_ref}/workspace/run_nanohorizon_craftax_hello_world_task.py score --output-root . --verifier-mode precheck`

Do not fabricate metrics or reports. Use the concrete runner outputs, and make
sure the required reportbench submission artifacts are written into the current
workspace root so SMR can publish them.

Do not replay recorded traces or regenerate rollout media after the runner
finishes. The runner owns the fast batched rollout path and writes representative
real gameplay media plus per-rollout metadata for all requested rollouts.
"""
acceptance_criteria = [
  "The workspace root contains `artifacts/eval_summary.json`, `artifacts/rollouts.jsonl`, `artifacts/result_manifest.json`, `artifacts/reportbench_output.json`, `artifacts/craftax_scorecard.json`, `artifacts/craftax_rollout_media.json`, `artifacts/open_research_leaderboard_evidence.json`, and `reports/reproduction.md`.",
  "`artifacts/eval_summary.json` records the concrete `mean_outcome_reward` for the requested Craftax trajectories.",
  "`artifacts/eval_summary.json` records `requested_rollouts` equal to `100`, positive `requested_total_llm_calls`, `requested_rollout_concurrency` at least `10`, and `requested_max_steps_per_rollout` equal to `500`.",
  "`artifacts/open_research_leaderboard_evidence.json` records all requested rollout rows and at least one captured real Craftax gameplay media artifact from the runner.",
  "`artifacts/result_manifest.json` records `status` equal to `succeeded` when the baseline completed without runner failure."
]
verification = { mode = "none", instructions = "Check that the workspace-root bundle exists and the eval summary reports the concrete mean reward for the requested NanoHorizon baseline run." }

[smr.pools]
worker_pool_id = "default"
require_pool_target = true
allow_container_url_fallback = false
allow_local_bootstrap = true

[smr.workspace_inputs]

[[smr.workspace_inputs.files]]
local = "README.md"
path = "README.md"
content_type = "text/markdown"

[[smr.workspace_inputs.files]]
local = "task.toml"
path = "task.toml"
content_type = "text/plain"

[[smr.workspace_inputs.files]]
local = "VERIFIER_RUBRIC.md"
path = "VERIFIER_RUBRIC.md"
content_type = "text/markdown"

[[smr.workspace_inputs.files]]
local = "task_contract.json"
path = "task_contract.json"
content_type = "application/json"

[[smr.workspace_inputs.files]]
local = "workspace/run_nanohorizon_craftax_hello_world_task.py"
path = "workspace/run_nanohorizon_craftax_hello_world_task.py"
content_type = "text/plain"

[[smr.workspace_inputs.files]]
local = "workspace/nanohorizon_craftax_hello_world_worker.py"
path = "workspace/nanohorizon_craftax_hello_world_worker.py"
content_type = "text/plain"

[smr.roles.orchestrator]
profile_id = "codex_gpt_5_4_mini_medium"
agent_kind = "codex"
model = "gpt-5.4-mini"
model_params = { reasoning_effort = "medium" }
purpose = "SMR planning, task decomposition, and review"

[smr.roles.worker]
profile_id = "codex_gpt_5_4_mini_medium"
agent_kind = "codex"
model = "gpt-5.4-mini"
model_params = { reasoning_effort = "medium" }
purpose = "SMR execution agent"

[smr.roles.verifier]
provider = "openai"
model = "gpt-5.4-nano"
temperature = 0.0
seed = 0
api_key_env = "OPENAI_API_KEY"

[limits]
time_budget_seconds = 1800
cost_budget_usd = 3.0
monthly_cost_budget_usd = 15.0

[smr.submission]
scoring_mode = "score_command"

[[smr.submission.artifacts]]
artifact_type = "report_md"
path = "reports/reproduction.md"
required = true

[[smr.submission.artifacts]]
artifact_type = "eval_summary"
path = "artifacts/eval_summary.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "rollouts"
path = "artifacts/rollouts.jsonl"
required = true

[[smr.submission.artifacts]]
artifact_type = "result_manifest"
path = "artifacts/result_manifest.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "reportbench_output"
path = "artifacts/reportbench_output.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "verifier_review"
path = "artifacts/verifier_review.json"
required = false

[reward]
mode = "artifact_json_path"
primary_metric = "mean_outcome_reward"
source_artifact = "artifacts/eval_summary.json"
source_json_path = "mean_outcome_reward"
rollout_source_artifact = "artifacts/eval_summary.json"

[verifier]
enabled = true
rubric_path = "VERIFIER_RUBRIC.md"
report_path = "reports/reproduction.md"
artifact_paths = [
  "artifacts/eval_summary.json",
  "artifacts/rollouts.jsonl",
  "artifacts/result_manifest.json",
]
output_path = "artifacts/verifier_review.json"

[output]
canonical_json_path = "artifacts/reportbench_output.json"

# ReportBench taxonomy — see evals/reportbench/metadata_schema.py and evals/reportbench/metadata.txt

[reportbench.metadata]
schema_version = 1
task_type = "eval"
call_budget = "short"
mode = "directed_effort"
difficulty = "easy"
duration = "15_mins"

quality = "high"
maturity = "high"
[reportbench.metadata.optimized_model]
size = "small"
modality = "text_only"
