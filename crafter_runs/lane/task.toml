schema_version = "0.1"

[task]
id = "reportbench/crafter_code_policy_deo_hillclimb_1cand"
dataset = "reportbench"
description = "Signed-in SDK Crafter code-policy directed-effort objective run using the RunBench HillClimbSymbolicBench Crafter lane."
family = "crafter"
method = "code_policy_deo_hillclimb"
role = "directed_effort"
executable = true
title = "Crafter Code Policy DEO Hillclimb"
kind = "smr_reportbench"
version = "0.1"
runner = "workspace/run_hillclimb_symbolicbench_task.py"
default_command = "python3 workspace/run_hillclimb_symbolicbench_task.py run --output-root {output_root} --env crafter --iterations 0 --train-seeds crafter=101,103,105,107,109,111,113,127,131,137,139,149,151,157,163,167,173,179,181,191 --strict-env"
score_command = "python3 workspace/run_hillclimb_symbolicbench_task.py score --output-root {output_root}"
report_path = "artifacts/workproduct_container/reproduction.md"
contract_path = "task_contract.json"
rubric_path = "RUBRIC.json"

[agent]
timeout_sec = 7200
max_cost_usd = 10.0

[environment]
schema_version = "2026-05-14-environment-v1"
name = "symbolic-crafter-py311"
manifest_digest = "sha256:315d026f543f528caac1baa048efef7992b18e856743b381cc0e2419afde1bab"
cpus = 2
memory_mb = 2560
allow_internet = false

[limits]
time_budget_seconds = 3600
cost_budget_usd = 10.0

[verifier]
timeout_sec = 900
enabled = true
rubric_path = "VERIFIER_RUBRIC.md"
report_path = "artifacts/workproduct_container/reproduction.md"
artifact_paths = [
  "artifacts/workproduct_container/manifest.json",
  "artifacts/workproduct_container/starting_container.json",
  "artifacts/workproduct_container/eval_summary.json",
  "artifacts/workproduct_container/experiment_results.json",
  "artifacts/workproduct_container/achievement_diversity.json",
  "artifacts/workproduct_container/candidate_ledger.jsonl",
  "artifacts/workproduct_container/directed_effort_outcomes.json",
  "artifacts/workproduct_container/reproduction.md",
  "artifacts/reportbench_output.json",
]
output_path = "artifacts/verifier_review.json"

[verdict]
authority = "reportbench"
primary_score_path = "artifacts/reportbench_output.json:reward.value"
pass_threshold = 0.01

[[verdict.gates]]
id = "benchmark_family_is_hillclimbsymbolicbench"
path = "artifacts/reportbench_output.json:benchmark_family"
equals = "runbench.hillclimbsymbolicbench"
reason = "wrong_benchmark_family"
required = true

[[verdict.gates]]
id = "score_positive"
path = "artifacts/reportbench_output.json:reward.value"
min_value = 0.01
reason = "score_not_positive"
required = true

[[verdict.gates]]
id = "candidate_policy_evaluated"
path = "artifacts/workproduct_container/eval_summary.json:candidate_count"
min_value = 2
reason = "candidate_policy_missing"
required = true

[[verdict.gates]]
id = "candidate_policy_completed"
path = "artifacts/workproduct_container/eval_summary.json:completed_candidate_count"
min_value = 2
reason = "candidate_policy_not_completed"
required = true

[[verdict.gates]]
id = "non_baseline_candidate_completed"
path = "artifacts/workproduct_container/eval_summary.json:completed_non_baseline_candidate_count"
min_value = 1
reason = "non_baseline_candidate_missing"
required = true

[[verdict.gates]]
id = "best_policy_is_candidate"
path = "artifacts/workproduct_container/eval_summary.json:best_source_kind"
equals = "candidate"
reason = "best_policy_is_baseline"
required = true

[[verdict.gates]]
id = "candidate_score_lift"
path = "artifacts/workproduct_container/eval_summary.json:best_score_delta"
min_value = 0.01
reason = "candidate_score_lift_missing"
required = true

[[verdict.gates]]
id = "best_policy_present"
path = "artifacts/workproduct_container/manifest.json:best_policy.present"
equals = true
reason = "best_policy_missing"
required = true

[[verdict.gates]]
id = "verifier_review_passes"
path = "artifacts/reportbench_output.json:verifier.score"
min_value = 1.0
reason = "verifier_review_failed"
required = true

[runner]
kind = "reportbench_suite"
args.task_root = "reportbench/lanes/crafter_code_policy_deo_hillclimb_1cand"
args.task_id = "crafter_code_policy_deo_hillclimb_1cand"
args.command = "python3 workspace/run_hillclimb_symbolicbench_task.py run --output-root {output_root} --env crafter --iterations 0 --train-seeds crafter=101,103,105,107,109,111,113,127,131,137,139,149,151,157,163,167,173,179,181,191 --strict-env"

[metadata]
source_lane = "reportbench/lanes/crafter_code_policy_deo_hillclimb"
runbench_subfamily = "hillclimbsymbolicbench"
benchmark_family = "runbench.hillclimbsymbolicbench"
objective_kind = "directed_effort_outcome"
objective = "Improve a pure symbolic Crafter code policy and publish objective-linked scoring evidence."
compatible_models = ["gpt-5.4-mini", "deepseek/deepseek-v4-flash"]

[smr]
execution_mode = "host_local_runner"
pool_strategy = "local_workspace_only"
work_mode = "directed_effort"
runbook = "lite"

[smr.key_policy]
mode = "synth_only"

[smr.runtime]
runtime_kind = "sandbox_agent"
environment_kind = "harbor"

[smr.objective]
mode = "orchestrator_authored"
kind = "directed_effort_outcome"
sdk_precreate = true
title = "Improve Crafter symbolic code policy"
description = "Run a signed-in directed-effort Crafter code-policy hillclimb and publish inspectable objective progress."
scope = "Crafter branch of HillClimbSymbolicBench: complete replacement heuristic_policy.py candidates, deterministic scoring, no policy-time LLM or network calls."
outcome_text = "Find and document a best accepted Crafter symbolic policy with score delta, early crafting achievement frequencies, and reproduction notes."
required_objective_count = 1
required_milestone_count = 4
required_progress_claim_count = 1
required_closeout_work_product = true
success_criteria = [
  "Baseline aggregate reward and achievement frequencies are recorded across exactly 20 train seeds.",
  "At least one non-baseline candidate compiles and is evaluated across exactly 20 train seeds.",
  "The best non-baseline candidate improves over the baseline.",
  "Score delta and accepted/rejected status are recorded for every candidate.",
  "Each candidate attempt is registered as an SMR experiment with at least one attached experiment result row.",
  "collect_wood, place_table, and make_wood_pickaxe frequencies are reported separately.",
  "The final workproduct includes best_policy, per-candidate policy sources, ledgers, and reproduction notes.",
]
deliverable_requirements = [
  "artifacts/workproduct_container/best_policy/heuristic_policy.py",
  "artifacts/workproduct_container/candidates/",
  "artifacts/workproduct_container/candidate_ledger.jsonl",
  "artifacts/workproduct_container/eval_summary.json",
  "artifacts/workproduct_container/achievement_diversity.json",
  "artifacts/workproduct_container/reproduction.md",
]
suggested_milestones = [
  "starting_container_verified",
  "baseline_aggregate_captured",
  "first_candidate_compiles",
  "first_score_lift_observed",
  "early_crafting_progress_observed",
  "workproduct_container_published",
]

[smr.project]
name = "ReportBench Crafter Code Policy DEO {nick}-{timestamp}"
timezone = "UTC"
notes = """
REPORT BENCH - Crafter code-policy DEO.

This signed-in SDK lane validates the Managed Research objectives launch for
directed-effort outcomes on the Crafter branch. The orchestrator must create
the directed-effort objective and milestones, assign Crafter policy work, claim
progress, and publish a WorkProduct with score evidence and reproduction notes.
"""

[smr.research]
scenario = "reportbench-{task_id}-crafter-code-policy-deo"
repo_url = ""

[[smr.research.tasks]]
task_key = "hillclimb_crafter_code_policy_deo"
kind = "repo_task"
required_work_products = [
  { kind = "report", subtype = "code_result", title = "Crafter code-policy DEO result", required = true, description = "Publish the runnable Crafter policy result, score evidence, and reproduction notes." },
]
instructions = """
Improve a pure symbolic Crafter code policy in directed-effort mode.

Read the staged task files under `{dataset_ref}/` first:
`{dataset_ref}/TASK_README.md`, `{dataset_ref}/TASK_INSTRUCTIONS.md`,
`{dataset_ref}/STARTING_CONTAINER.md`, `{dataset_ref}/CRAFTER_POLICY_CONTEXT.md`,
and `{dataset_ref}/task_contract.json`.

The runnable task bundle is materialized in two places by the sandbox:
`{dataset_ref}/...` for provenance and the repo-root paths used by the
commands below. Before running, assert the root files exist:
`workspace/run_hillclimb_symbolicbench_task.py`,
`containers/crafter/heuristic_policy.py`,
`containers/crafter/run_heuristic_sweep.py`, and `task_contract.json`.

This is FAST-MODE validation. Your job: produce EXACTLY ONE non-baseline
candidate that improves over the baseline, then STOP. Do not create a
second candidate. Do not create a candidate ladder. Do not iterate. As
soon as your first candidate compiles, runs across the train seeds, and
beats the baseline score, declare success and publish the workproduct.
If the first candidate compiles but does NOT beat the baseline, revise
it in place (same directory, same candidate_id) rather than creating a
second candidate directory.

Use exactly these 20 train seeds for Crafter unless the task contract
is updated:
101,103,105,107,109,111,113,127,131,137,139,149,151,157,163,167,173,179,181,191.

Create the ONE non-baseline candidate under
`candidates/crafter/attempt_1/heuristic_policy.py`. Only publish success
when `eval_summary.json` shows at least 2 completed records (baseline +
one non-baseline), at least 1 completed non-baseline candidate record,
and a best score above the baseline.

Register the ONE non-baseline candidate as a first-class SMR experiment
through the runtime MCP tools. The proposed experiment must include
`baseline_snapshot`, `candidate_snapshot`, `protocol_snapshot`, and
`artifact_refs`: candidate code digest/path/entrypoint go in
`candidate_snapshot` and `artifact_refs`; metric name `symbolic_policy_score`,
`metric_direction=higher_is_better`, split, 20-seed train `seed_set`,
sample_size, scorer, and acceptance threshold go in `protocol_snapshot`.
After scoring, attach one aggregate experiment result row with value,
baseline_value, delta, sample_size=20, split_name=`train`, evidence_grade,
truth_status, caveats, and summary/per-seed artifact references. Do not
create one backend result row per seed; per-seed data belongs in
`artifacts/workproduct_container/experiment_results.json` and the
referenced `experiment_results/*/*/*/results.json` artifacts. Inspect
the registered experiment/result row before final closeout.

Run:
python3 workspace/run_hillclimb_symbolicbench_task.py run --output-root . --env crafter --iterations 0 --train-seeds crafter=101,103,105,107,109,111,113,127,131,137,139,149,151,157,163,167,173,179,181,191 --strict-env
python3 workspace/run_hillclimb_symbolicbench_task.py score --output-root .
"""
acceptance_criteria = [
  "A directed-effort outcome is created by the orchestrator.",
  "At least four milestones are created or progress events are recorded.",
  "The worker emits a workproduct bundle and reportbench_output.json.",
  "Crafter scoring evidence reports reward and achievement frequencies.",
  "At least one non-baseline candidate policy is evaluated and preserved in the workproduct.",
  "SMR experiment rows and aggregate result rows exist for each non-baseline candidate attempt, with candidate_snapshot/protocol_snapshot/result_summary populated.",
  "A code WorkProduct with reproduction notes is published.",
]

[smr.pools]
worker_pool_id = "{nick}"
require_pool_target = true
allow_container_url_fallback = false
allow_local_bootstrap = true

