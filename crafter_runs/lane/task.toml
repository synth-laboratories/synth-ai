schema_version = "0.1"

[task]
id = "reportbench/crafter_code_policy_deo_hillclimb_1cand"
dataset = "reportbench"
description = "Signed-in SDK Crafter code-policy directed-effort objective run using the RunBench HillClimbSymbolicBench Crafter lane."
family = "crafter"
method = "code_policy_deo_hillclimb"
role = "directed_effort"
executable = true
title = "Crafter Code Policy DEO Hillclimb"
kind = "smr_reportbench"
version = "0.1"
runner = "workspace/run_hillclimb_symbolicbench_task.py"
default_command = "python3 workspace/run_hillclimb_symbolicbench_task.py run --output-root {output_root} --env crafter --iterations 0 --candidate-root candidates --candidate-id attempt_1 --train-seeds crafter=101,103,105,107,109,111,113,127,131,137,139,149,151,157,163,167,173,179,181,191 --strict-env"
score_command = "python3 workspace/run_hillclimb_symbolicbench_task.py score --output-root {output_root}"
report_path = "artifacts/workproduct_container/reproduction.md"
contract_path = "task_contract.json"
rubric_path = "RUBRIC.json"

[agent]
timeout_sec = 7200
max_cost_usd = 10.0

[environment]
schema_version = "2026-05-14-environment-v1"
name = "symbolic-crafter-py311"
manifest_digest = "sha256:315d026f543f528caac1baa048efef7992b18e856743b381cc0e2419afde1bab"
cpus = 2
memory_mb = 2560
allow_internet = false

[limits]
time_budget_seconds = 3600
cost_budget_usd = 10.0

[verifier]
timeout_sec = 900
enabled = true
rubric_path = "VERIFIER_RUBRIC.md"
report_path = "artifacts/workproduct_container/reproduction.md"
artifact_paths = [
  "artifacts/workproduct_container/manifest.json",
  "artifacts/workproduct_container/starting_container.json",
  "artifacts/workproduct_container/eval_summary.json",
  "artifacts/workproduct_container/experiment_results.json",
  "artifacts/workproduct_container/achievement_diversity.json",
  "artifacts/workproduct_container/candidate_ledger.jsonl",
  "artifacts/workproduct_container/directed_effort_outcomes.json",
  "artifacts/workproduct_container/reproduction.md",
  "artifacts/reportbench_output.json",
]
output_path = "artifacts/verifier_review.json"

[verdict]
authority = "reportbench"
primary_score_path = "artifacts/reportbench_output.json:reward.value"
pass_threshold = 0.01

[[verdict.gates]]
id = "benchmark_family_is_hillclimbsymbolicbench"
path = "artifacts/reportbench_output.json:benchmark_family"
equals = "runbench.hillclimbsymbolicbench"
reason = "wrong_benchmark_family"
required = true

[[verdict.gates]]
id = "score_positive"
path = "artifacts/reportbench_output.json:reward.value"
min_value = 0.01
reason = "score_not_positive"
required = true

[[verdict.gates]]
id = "candidate_policy_evaluated"
path = "artifacts/workproduct_container/eval_summary.json:candidate_count"
min_value = 2
reason = "candidate_policy_missing"
required = true

[[verdict.gates]]
id = "candidate_policy_completed"
path = "artifacts/workproduct_container/eval_summary.json:completed_candidate_count"
min_value = 2
reason = "candidate_policy_not_completed"
required = true

[[verdict.gates]]
id = "non_baseline_candidate_completed"
path = "artifacts/workproduct_container/eval_summary.json:completed_non_baseline_candidate_count"
min_value = 1
reason = "non_baseline_candidate_missing"
required = true

[[verdict.gates]]
id = "best_policy_is_candidate"
path = "artifacts/workproduct_container/eval_summary.json:best_source_kind"
equals = "candidate"
reason = "best_policy_is_baseline"
required = true

[[verdict.gates]]
id = "candidate_score_lift"
path = "artifacts/workproduct_container/eval_summary.json:best_score_delta"
min_value = 0.01
reason = "candidate_score_lift_missing"
required = true

[[verdict.gates]]
id = "best_policy_present"
path = "artifacts/workproduct_container/manifest.json:best_policy.present"
equals = true
reason = "best_policy_missing"
required = true

[[verdict.gates]]
id = "verifier_review_passes"
path = "artifacts/reportbench_output.json:verifier.score"
min_value = 1.0
reason = "verifier_review_failed"
required = true

[runner]
kind = "reportbench_suite"
args.task_root = "reportbench/lanes/crafter_code_policy_deo_hillclimb_1cand"
args.task_id = "crafter_code_policy_deo_hillclimb_1cand"
args.command = "python3 workspace/run_hillclimb_symbolicbench_task.py run --output-root {output_root} --env crafter --iterations 0 --candidate-root candidates --candidate-id attempt_1 --train-seeds crafter=101,103,105,107,109,111,113,127,131,137,139,149,151,157,163,167,173,179,181,191 --strict-env"

[metadata]
source_lane = "reportbench/lanes/crafter_code_policy_deo_hillclimb"
runbench_subfamily = "hillclimbsymbolicbench"
benchmark_family = "runbench.hillclimbsymbolicbench"
objective_kind = "directed_effort_outcome"
objective = "Improve a pure symbolic Crafter code policy and publish objective-linked scoring evidence."
compatible_models = ["gpt-5.4-mini", "deepseek/deepseek-v4-flash"]

[smr]
execution_mode = "host_local_runner"
pool_strategy = "local_workspace_only"
work_mode = "directed_effort"
runbook = "lite"

[smr.key_policy]
mode = "synth_only"

[smr.runtime]
runtime_kind = "sandbox_agent"
environment_kind = "harbor"

[smr.objective]
mode = "orchestrator_authored"
kind = "directed_effort_outcome"
sdk_precreate = false
title = "Improve Crafter symbolic code policy"
description = "Run a signed-in directed-effort Crafter code-policy hillclimb and publish inspectable objective progress."
scope = "Crafter branch of HillClimbSymbolicBench: complete replacement heuristic_policy.py candidates, deterministic scoring, no policy-time LLM or network calls."
outcome_text = "Find and document a best accepted Crafter symbolic policy with score delta, early crafting achievement frequencies, and reproduction notes."
required_objective_count = 1
required_milestone_count = 4
required_progress_claim_count = 1
required_closeout_work_product = true
success_criteria = [
  "Baseline aggregate reward and achievement frequencies are recorded across the configured train seeds.",
  "At least one non-baseline candidate compiles and is evaluated across the configured train seeds.",
  "The best non-baseline candidate improves over the baseline.",
  "Score delta and accepted/rejected status are recorded for every candidate.",
  "Each candidate attempt is registered as an SMR experiment with at least one attached experiment result row.",
  "collect_wood, place_table, and make_wood_pickaxe frequencies are reported separately.",
  "The final workproduct includes best_policy, per-candidate policy sources, ledgers, and reproduction notes.",
]
deliverable_requirements = [
  "artifacts/workproduct_container/best_policy/heuristic_policy.py",
  "artifacts/workproduct_container/candidates/",
  "artifacts/workproduct_container/candidate_ledger.jsonl",
  "artifacts/workproduct_container/eval_summary.json",
  "artifacts/workproduct_container/achievement_diversity.json",
  "artifacts/workproduct_container/reproduction.md",
]
suggested_milestones = [
  "starting_container_verified",
  "baseline_aggregate_captured",
  "first_candidate_compiles",
  "first_score_lift_observed",
  "early_crafting_progress_observed",
  "workproduct_container_published",
]

[smr.project]
name = "ReportBench Crafter Code Policy DEO {nick}-{timestamp}"
timezone = "UTC"
notes = """
REPORT BENCH - Crafter code-policy DEO (parallel worker race).

Guidance-only kickoff: see staged kickoff `project_notes_framing` and `task_briefs`.
The orchestrator must create the directed-effort parent objective, milestones, and
progress claims, then `plan_tasks` (no pre-seeded kickoff tasks). Orchestrator owns
review and final WorkProduct closeout.
"""

[smr.research]
scenario = "reportbench-{task_id}-crafter-code-policy-deo"
repo_url = ""

[smr.pools]
worker_pool_id = "{nick}"
require_pool_target = true
allow_container_url_fallback = false
allow_local_bootstrap = true

